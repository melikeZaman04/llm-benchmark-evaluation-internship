name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Sandbox imajını derle
        run: docker build -t trc-sandbox:latest src/sandbox

      - name: Testleri çalıştır (birim + Docker entegrasyon)
        run: python -m pytest -v
